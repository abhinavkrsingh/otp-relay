name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle 8.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.2'

      # If KEYSTORE_B64 secret exists, use it. Otherwise generate one and print it
      # so you can save it as a GitHub Secret (only needed once).
      - name: Prepare signing keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > android/app/release.jks
            echo "Using saved keystore from secret."
          else
            keytool -genkey -v \
              -keystore android/app/release.jks \
              -alias otp-relay \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass otprelay123 -keypass otprelay123 \
              -dname "CN=OTP Relay,O=Personal,C=IN" -noprompt
            echo ""
            echo "========== FIRST RUN: SAVE THIS AS GITHUB SECRET =========="
            echo "Go to repo → Settings → Secrets → Actions → New secret"
            echo "Name: KEYSTORE_B64"
            echo "Value:"
            base64 -w 0 android/app/release.jks
            echo ""
            echo "==========================================================="
          fi

      - name: Build signed APK
        working-directory: android
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: otp-relay-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
